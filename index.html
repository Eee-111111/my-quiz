<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>供應鏈管理營運管理師 - 隨機刷題系統</title>
    <style>
        body { font-family: "Microsoft JhengHei", Arial, sans-serif; max-width: 800px; margin: 30px auto; padding: 20px; line-height: 1.6; background-color: #f4f7f6; color: #333; }
        .quiz-container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h1 { text-align: center; color: #2c3e50; margin-bottom: 10px; }
        .subtitle { text-align: center; color: #7f8c8d; margin-bottom: 30px; font-size: 0.95em; }
        .question { margin-bottom: 25px; padding: 20px; background: #fafafa; border-radius: 8px; border-left: 5px solid #3498db; }
        .question p { font-weight: bold; margin-top: 0; margin-bottom: 12px; font-size: 1.05em; white-space: pre-wrap; }
        .options label { display: block; margin: 8px 0; padding: 10px; background: white; border: 1px solid #e0e0e0; border-radius: 6px; cursor: pointer; transition: all 0.2s; }
        .options label:hover { background: #ebf5fb; border-color: #3498db; }
        .options input[type="radio"] { margin-right: 10px; transform: scale(1.1); }
        button { background: #2ecc71; color: white; border: none; padding: 12px 30px; border-radius: 6px; cursor: pointer; font-size: 18px; font-weight: bold; width: 100%; margin-top: 20px; transition: background 0.2s; }
        button:hover { background: #27ae60; }
        .result { margin-top: 30px; padding: 20px; background: #e8f8f5; border-radius: 8px; border: 1px solid #a3e4d7; display: none; text-align: center; }
        .score { font-size: 24px; color: #117a65; font-weight: bold; margin-bottom: 10px; }
        .feedback { margin-top: 8px; font-weight: bold; font-size: 0.95em; padding: 5px 10px; border-radius: 4px; display: inline-block; }
        .correct-ans { background: #d4efdf; color: #196f3d; }
        .wrong-ans { background: #f9e79f; color: #7d6608; }
    </style>
</head>
<body>

<div class="quiz-container">
    <h1>🎯 供應鏈管理專業認證</h1>
    <div class="subtitle">營運管理師模擬試題（隨機抽選 30 題練習）</div>
    <hr style="border: 0; height: 1px; background: #eee; margin-bottom: 20px;">
    
    <form id="quizForm">
        <div id="questionsContainer"></div>
        <button type="button" onclick="submitQuiz()">繳交答案，立即查看分數與解答</button>
    </form>

    <div id="resultArea" class="result">
        <p class="score" id="scoreDisplay"></p>
        <p>答對題數：<span id="correctCountDisplay"></span> / 30 題</p>
        <p style="color: #7f8c8d; font-size: 0.9em;">提示：可以重新整理網頁 (按 F5) 來抽選下一組 30 題！</p>
    </div>
</div>

<script>
// 完整題庫
const itemBank = [
    { q: "針對企業強化供應鏈管理所創造的優勢與效益，下列敘述何者正確？\nA.不僅在於節流(Costdown)，同時也能創造利潤與提升股東權益。\nB.提升顧客服務水準，創造銷售收益。\nC.降低存貨與作業成本，提升整體營收。", options: ["A、B正確，C不正確。", "A、C正確 B不正確。", "A、B、C皆正確", "B、C正確，A不正確。"], answer: 2 },
    { q: "有關接單後組裝生產(ATO)的敘述，下列選項何者錯誤？", options: ["滿足客戶對於產品客製化(Customization)與及時(Just in Time)供應的需求。", "提供很短的訂單達交(Order to Delivery; OTD)時間。", "滿足客戶少量多樣化的需求，提升客戶滿意度。", "ATO 主要適用於製造業(例如筆記型或平板電腦的組裝)，並不適用於流通業之連鎖商店型態的經營(例如便利超商或量販店)。"], answer: 3 },
    { q: "在企業經營與管理，有一種策略分析方法，可以檢視企業是否具備良好的供應鏈管理，建立自身的核心能力與競爭優勢，進而創造企業本身最大的價值。請問是下列哪一項分析方法？", options: ["價值鏈分析(Value Chain Analysis. VCA)", "損益平衡分析(Break Even Point BEP)", "多變量分析(Multivariate Analysis)", "可靠度分析(Reliability analysis)"], answer: 0 },
    { q: "企業推廣供應鏈管理創造的優勢與效益為何？", options: ["企業自身的成功", "促進供應鏈整體成員的成功", "供應商的成功", "直接顧客的成功"], answer: 1 },
    { q: "針對企業全球化的原因，下列敘述何者正確？\nA.市場的考量 B.技術的考量 C.成本的考量 D.經濟和政治層面的考量", options: ["AB", "ABC", "ABD", "ABCD"], answer: 3 },
    { q: "有關全球運籌管理模式的敘述如下：商品在工廠製造完成後，在非常短的時間內，由工廠直接安排最快速的運輸模式，運送到下游客戶手中，以達到時效性要求。試問屬於全球運籌管理之何種全球運籌管理模式？", options: ["直接運送模式(Direct Shipment)", "當地補貨中心(Local Buffer Center)", "海外組裝中心(Configuration Center)", "以上皆非"], answer: 0 },
    { q: "當企業的競爭優勢為「客製化與快速交貨時」，最適合的生產模式 homes？", options: ["計劃生產(Make-to-Stock, MTS)", "接單組裝(Assembly-to-Order, ATO)", "接單生產(Make-to-Order, MTO)", "大量生產(Mass Production)"], answer: 1 },
    { q: "有關總體規劃(Aggregate Planning)的主要功能，下列敘述何者正確？\nA.提供管理者使用資源之依據，避免發生資源閒置或過度負荷，進而降低生產成本。\nB.透過銷售預測以使生產資源完成更適切的分配，除了滿足客戶需求，並支持與實現銷售計畫。\nC.製造資源不足時，幫助充分使用資源以獲得最大產出，或者提出產能擴充計畫以跨大獲利。", options: ["A、B正確，C不正確。", "A、B、C皆正確", "A、C正確，B不正確。", "B、C正確 A不正確。"], answer: 1 },
    { q: "主排程規劃(Master Scheduling)必須於公司內部進行跨部門溝通與協調的部門？\nA.銷售部門 B.生產製造部門 C.研發部門 D.財務部門 E.人資部門", options: ["AB", "ABC", "ABCD", "ABCDE"], answer: 3 },
    { q: "下列何者是總體規劃(Aggregate Planning)所考慮的因素？\nA.原物料供應與取得 B.生產水準 C.委外加工產能 D.總體經濟環境 E.員工薪資", options: ["AB", "ABC", "ABCD", "ABCDE"], answer: 3 },
    { q: "在主排程規劃中訂定三階段時間柵欄(Time Fense)，生產排程允許自由調整與變動的階段是在：", options: ["凍結區域", "適度變動區域", "可變動區域", "以上皆非"], answer: 2 },
    { q: "在生產管理運用瓶頸製程管理，可以達成企業整體營運目標為何？\nA.增加系統的產出 B.降低整體作業費用 C.降低整體庫存水準", options: ["A、B正確 C不正確。", "A、B、C皆正確", "A、C正確，B不正確。", "B、C正確，A不正確。"], answer: 1 },
    { q: "有關瓶頸製程的概念，下列敘述何者錯誤？", options: ["生產系統當中產能最吃緊的製程即可定義為「瓶頸製程」，至於其餘的製程都可被稱為「非瓶頸製程」。", "提升瓶頸製程的速度可以提升整體生產系統的產出速度", "提升非瓶頸製成的速度對於提升整體系統的產出速度成效甚大", "無論製造業或服務業的流程管理都適用「瓶頸控制」來掌控整體生產系統的產出"], answer: 2 },
    { q: "有關 ABC 存貨分類與管理原則，下列敘述何者錯誤？", options: ["將存貨按成本比重高低分為A、B、C三類，依據其重要性採取不同的控制方法。", "A類存貨數量最多，但存貨的價值卻最少，應採用簡單控制即可。", "C類存貨數量最多，但存貨的價值卻最少，應採用簡單控制即可。", "管理者應著重於高流通、高單價的商品管理"], answer: 1 },
    { q: "如何維持合理庫存是企業管理的重要工作，下列敘述何者正確？\nA.強化物料驗收、降低物料品質不良率 B.遴選優良供應商 C.採行經濟訂購量 D.實施及時供應系統 E.確保存量記錄之正確性", options: ["ABC", "ABCE", "ABDE", "ABCDE"], answer: 3 }
];

function shuffle(array) {
    let currentIndex = array.length, randomIndex;
    while (currentIndex != 0) {
        randomIndex = Math.floor(Math.random() * currentIndex);
        currentIndex--;
        [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
    }
    return array;
}

let currentQuestions = [];

function initQuiz() {
    // 核心邏輯：複製題庫並洗牌
    const shuffledBank = shuffle([...itemBank]);
    // 確保題庫夠多，這裡先抽10題做測試，保證一定會變
    currentQuestions = shuffledBank.slice(0, 10); 

    const container = document.getElementById('questionsContainer');
    container.innerHTML = '';

    currentQuestions.forEach((item, index) => {
        let optionsHTML = '';
        item.options.forEach((opt, optIdx) => {
            optionsHTML += `
                <label>
                    <input type="radio" name="q${index}" value="${optIdx}">
                    ${opt}
                </label>
            `;
        });

        container.innerHTML += `
            <div class="question">
                <p>${index + 1}. ${item.q}</p>
                <div class="options">${optionsHTML}</div>
                <div id="feedback${index}"></div>
            </div>
        `;
    });

    document.getElementById('resultArea').style.display = 'none';
}

function submitQuiz() {
    let correctCount = 0;
    let allAnswered = true;

    for (let index = 0; index < currentQuestions.length; index++) {
        const selected = document.querySelector(`input[name="q${index}"]:checked`);
        if (!selected) {
            allAnswered = false;
            break;
        }
    }

    if (!allAnswered) {
        alert("⚠️ 還有題目沒寫完喔！");
        return;
    }

    currentQuestions.forEach((item, index) => {
        const selected = document.querySelector(`input[name="q${index}"]:checked`);
        const userAnswer = parseInt(selected.value);
        const feedbackDiv = document.getElementById(`feedback${index}`);

        if (userAnswer === item.answer) {
            correctCount++;
            feedbackDiv.innerHTML = `<div class="feedback correct-ans">🎯 答對了！</div>`;
        } else {
            feedbackDiv.innerHTML = `<div class="feedback wrong-ans">❌ 正確答案為：${item.options[item.answer]}</div>`;
        }
    });

    const score = Math.round((correctCount / currentQuestions.length) * 100);
    document.getElementById('scoreDisplay').innerText = `您的總得分：${score} 分`;
    document.getElementById('resultArea').style.display = 'block';
}

// 網頁一載入，強制執行洗牌
window.onload = function() {
    initQuiz();
};
// 雙重保險觸發
document.addEventListener("DOMContentLoaded", initQuiz);
</script>
</body>
</html>
