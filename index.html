// 核心洗牌演算法：完全隨機打亂
function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[array[j]]] = [array[array[j]], array[i]];
    }
    return array;
}

let currentQuestions = [];

function initQuiz() {
    const shuffledBank = shuffle([...itemBank]);
    currentQuestions = shuffledBank.slice(0, 30); // 每次強制抽30題

    const container = document.getElementById('questionsContainer');
    container.innerHTML = '';

    currentQuestions.forEach((item, index) => {
        let optionsHTML = '';
        item.options.forEach((opt, optIdx) => {
            optionsHTML += `
                <label>
                    <input type="radio" name="q${index}" value="${optIdx}">
                    ${opt}
                </label>
            `;
        });

        container.innerHTML += `
            <div class="question" id="qBlock${index}">
                <p>${index + 1}. ${item.q}</p>
                <div class="options">${optionsHTML}</div>
                <div id="feedback${index}"></div>
            </div>
        `;
    });

    document.getElementById('resultArea').style.display = 'none';
    const btn = document.querySelector('button');
    btn.disabled = false;
    btn.innerText = '繳交答案，立即查看分數與解答';
    btn.style.background = '#2ecc71';
}

function submitQuiz() {
    let correctCount = 0;
    let allAnswered = true;

    for (let index = 0; index < currentQuestions.length; index++) {
        const selected = document.querySelector(`input[name="q${index}"]:checked`);
        if (!selected) {
            allAnswered = false;
            break;
        }
    }

    if (!allAnswered) {
        alert("⚠️ 發現您還有題目沒寫完喔！請全部勾選後再繳交解答。");
        return;
    }

    currentQuestions.forEach((item, index) => {
        const selected = document.querySelector(`input[name="q${index}"]:checked`);
        const userAnswer = parseInt(selected.value);
        const feedbackDiv = document.getElementById(`feedback${index}`);

        if (userAnswer === item.answer) {
            correctCount++;
            feedbackDiv.innerHTML = `<div class="feedback correct-ans">🎯 答對了！</div>`;
        } else {
            feedbackDiv.innerHTML = `<div class="feedback wrong-ans">❌ 答錯囉！正確答案為：${item.options[item.answer]}</div>`;
        }
    });

    const score = Math.round((correctCount / currentQuestions.length) * 100);
    document.getElementById('scoreDisplay').innerText = `您的總得分：${score} 分`;
    document.getElementById('correctCountDisplay').innerText = correctCount;
    document.getElementById('resultArea').style.display = 'block';

    const btn = document.querySelector('button');
    btn.disabled = true;
    btn.innerText = '測驗完成！看上面各題對答案';
    btn.style.background = '#95a5a6';

    document.getElementById('resultArea').scrollIntoView({ behavior: 'smooth' });
}

// 雙重保障：無論網頁如何載入，都立刻執行亂數抽題
if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initQuiz);
} else {
    initQuiz();
}
